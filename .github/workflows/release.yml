name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check plugin
        run: npm run check

      - name: Build plugin
        run: npm run build

      - name: Prepare release assets
        id: prepare
        run: |
          RELEASE_SUFFIX="beta.${GITHUB_RUN_NUMBER}" node scripts/prepare-release.mjs > release.json
          cat release.json
          VERSION=$(node -e "const fs = require('fs'); console.log(JSON.parse(fs.readFileSync('release.json', 'utf8')).version)")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.prepare.outputs.version }}
          name: v${{ steps.prepare.outputs.version }}
          prerelease: true
          make_latest: false
          files: |
            .release/manifest.json
            .release/versions.json
            main.js
            styles.css
          generate_release_notes: true
